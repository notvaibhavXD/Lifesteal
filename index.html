<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lifesteal SMP | You're Invited</title>

<link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet">

<style>
:root{
--red:#d10000;
--black:#000000;
--dark:#0a0a0a;
--text-color:#61211b;
}

*{box-sizing:border-box;margin:0;padding:0}

html{scroll-behavior:smooth}

body{
font-family:'Minecraftia', monospace;
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
position:relative;

/* RED → BLACK TOP TO BOTTOM */
background:linear-gradient(to bottom,#8b0000 0%,#000000 100%);
}

/* LIFESTEAL TITLE */
.title{
font-family:'Minecraftia', monospace;
font-size:90px;
letter-spacing:6px;
color:#ff2a2a;
text-shadow:
4px 4px 0 #000,
0 0 25px #ff0000,
0 0 50px #700000;
margin-bottom:50px;
}

/* JOIN BUTTON */
.join-btn{
font-family:'Minecraftia', monospace;
font-size:22px;
padding:18px 45px;

background:linear-gradient(#ff0000,#7a0000);

border:4px solid #ff5555;
border-bottom:8px solid #400000;
border-right:8px solid #400000;

cursor:pointer;
text-decoration:none;
color:white;

transition:.15s;
}

.join-btn:hover{background:#ff1a1a}

.join-btn:active{
transform:translate(4px,4px);
border-bottom:4px solid #400000;
border-right:4px solid #400000;
}

/* HEART DECORATION */
.heart{
position:absolute;
width:80px;
pointer-events:none;
image-rendering:pixelated;
opacity:.9;
}

.h1{top:15%;left:10%}
.h2{top:20%;right:12%;width:90px}
.h3{bottom:25%;left:18%;width:70px}
.h4{bottom:18%;right:10%;width:85px}

/* INVITE SECTION */
.invite-section{
min-height:100vh;
background:#0a0a0a;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:60px 20px;
}

.generator-container{
background:#111;
padding:40px;
border:4px solid #8b0000;
border-radius:10px;
box-shadow:0 0 40px rgba(255,0,0,.25);

display:flex;
flex-direction:column;
align-items:center;
gap:20px;
max-width:900px;
width:100%;
}

canvas{
max-width:100%;
border-radius:6px;
box-shadow:0 15px 30px rgba(0,0,0,.7);
}

.controls{
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
width:100%;
max-width:400px;
}

.controls label{
font-size:20px;
color:#ccc;
}

.controls input{
font-family:'Minecraftia', monospace;
font-size:18px;
padding:10px;
width:100%;
text-align:center;
background:#1a1a1a;
color:white;
border:2px solid #555;
outline:none;
}

.controls input:focus{border-color:#ff0000}

.download-btn{
font-family:'Minecraftia', monospace;
font-size:18px;
padding:12px 30px;

background:#2e8b57;

border:3px solid #3cb371;
border-bottom:6px solid #006400;
border-right:6px solid #006400;

cursor:pointer;
color:white;
width:100%;
}

.download-btn:active{
transform:translate(3px,3px);
border-bottom:3px solid #006400;
border-right:3px solid #006400;
}

@media(max-width:768px){
.title{font-size:55px}
.heart{width:55px}
}
</style>
</head>

<body>

<section class="hero">

<img src="heart.png" class="heart h1">
<img src="heart.png" class="heart h2">
<img src="heart.png" class="heart h3">
<img src="heart.png" class="heart h4">

<h1 class="title">LIFESTEAL</h1>

<a href="#invite-generator" class="join-btn">JOIN</a>

</section>

<section id="invite-generator" class="invite-section">

<div class="generator-container">

<canvas id="inviteCanvas"></canvas>

<div class="controls">

<label for="playerName">Enter Minecraft Username</label>

<input type="text" id="playerName" placeholder="Steve" maxlength="20">

<button id="downloadBtn" class="download-btn">DOWNLOAD INVITE</button>

</div>

</div>

</section>

<script>
const canvas=document.getElementById('inviteCanvas')
const ctx=canvas.getContext('2d')

const nameInput=document.getElementById('playerName')
const downloadBtn=document.getElementById('downloadBtn')

const inviteImage=new Image()
inviteImage.src="Your're Invited.png"

function drawCanvas(){

if(!inviteImage.complete)return

canvas.width=inviteImage.width
canvas.height=inviteImage.height

ctx.drawImage(inviteImage,0,0)

const name=nameInput.value

if(name){

const fontSize=Math.floor(canvas.width*0.055)
ctx.font=`${fontSize}px serif`
ctx.fillStyle="#61211b"

const textX = canvas.width * 0.18; // start from left side of dashed line
const textY = canvas.height * 0.82; // position exactly over dashed line

ctx.textAlign = "left";
ctx.fillText(name, textX, textY)

}
}

inviteImage.onload=drawCanvas

nameInput.addEventListener('input',drawCanvas)

downloadBtn.addEventListener('click',()=>{

const dataURL=canvas.toDataURL('image/png')

const link=document.createElement('a')
link.download='Lifesteal_Invite.png'
link.href=dataURL

link.click()

})
</script>

</body>
</html>
