<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lifesteal SMP | You're Invited</title>

<link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet">

<style>
:root{
--red:#d10000;
--black:#000000;
--dark:#0a0a0a;
--text-color:#61211b;
}

*{box-sizing:border-box;margin:0;padding:0}

html{scroll-behavior:smooth}

body{
font-family:'Minecraftia', monospace;
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
overflow:hidden;
background:#000;
}

/* LAVA LAMP ORBS */
.hero>*{position:relative;z-index:2}

.orb{
position:absolute;
border-radius:50%;
filter:blur(90px);
opacity:.65;
pointer-events:none;
z-index:0;
animation:float 30s infinite linear;
}

.orb.red{background:#ff0000}
.orb.dark{background:#8b0000}

@keyframes float{
0%{transform:translate(0px,0px) scale(1)}
20%{transform:translate(250px,-180px) scale(1.25)}
40%{transform:translate(-200px,220px) scale(.85)}
60%{transform:translate(220px,140px) scale(1.15)}
80%{transform:translate(-160px,-160px) scale(1.05)}
100%{transform:translate(0px,0px) scale(1)}
}

/* LIFESTEAL TITLE */
/* LIFESTEAL TITLE HUGE */
/* LIFESTEAL TITLE HUGE */
.title{
font-family:'Minecraftia', monospace;
font-size:12vw;
letter-spacing:10px;
color:#ff2a2a;
text-shadow:
8px 8px 0 #000,
0 0 30px #ff0000,
0 0 90px #700000;
margin-bottom:120px;
position:relative;
z-index:3;
line-height:0.9;
}

/* JOIN BUTTON */
.join-btn{
font-family:'Minecraftia', monospace;
font-size:22px;
padding:18px 45px;

background:linear-gradient(#ff0000,#7a0000);

border:4px solid #ff5555;
border-bottom:8px solid #400000;
border-right:8px solid #400000;

cursor:pointer;
text-decoration:none;
color:white;

transition:.15s;
}

.join-btn:hover{background:#ff1a1a}

.join-btn:active{
transform:translate(4px,4px);
border-bottom:4px solid #400000;
border-right:4px solid #400000;
}

/* HEART DECORATION */
.heart{
position:absolute;
width:80px;
pointer-events:none;
image-rendering:pixelated;
opacity:.9;
}

.h1{top:15%;left:10%}
.h2{top:20%;right:12%;width:90px}
.h3{bottom:25%;left:18%;width:70px}
.h4{bottom:18%;right:10%;width:85px}

/* INVITE SECTION */
.invite-section{
min-height:100vh;
background:#0a0a0a;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:60px 20px;
}

.generator-container{
background:#111;
padding:40px;
border:4px solid #8b0000;
border-radius:10px;
box-shadow:0 0 40px rgba(255,0,0,.25);

display:flex;
flex-direction:column;
align-items:center;
gap:20px;
max-width:900px;
width:100%;
}

canvas{
max-width:100%;
border-radius:6px;
box-shadow:0 15px 30px rgba(0,0,0,.7);
}

.controls{
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
width:100%;
max-width:400px;
}

.controls label{
font-size:20px;
color:#ccc;
}

.controls input{
font-family:'Minecraftia', monospace;
font-size:18px;
padding:10px;
width:100%;
text-align:center;
background:#1a1a1a;
color:white;
border:2px solid #555;
outline:none;
}

.controls input:focus{border-color:#ff0000}

.download-btn{
font-family:'Minecraftia', monospace;
font-size:18px;
padding:12px 30px;

background:#2e8b57;

border:3px solid #3cb371;
border-bottom:6px solid #006400;
border-right:6px solid #006400;

cursor:pointer;
color:white;
width:100%;
}

.download-btn:active{
transform:translate(3px,3px);
border-bottom:3px solid #006400;
border-right:3px solid #006400;
}

@media(max-width:768px){
.title{font-size:200px !important}
.heart{width:55px}
}
.heart{width:55px}
}
.heart{width:55px}
}
</style>
</head>

<body>

<section class="hero">

<div class="orb red" style="width:300px;height:300px;top:10%;left:10%;animation-delay:0s"></div>
<div class="orb dark" style="width:260px;height:260px;top:20%;left:60%;animation-delay:2s"></div>
<div class="orb red" style="width:280px;height:280px;top:60%;left:20%;animation-delay:4s"></div>
<div class="orb dark" style="width:320px;height:320px;top:70%;left:70%;animation-delay:6s"></div>
<div class="orb red" style="width:240px;height:240px;top:40%;left:40%;animation-delay:8s"></div>
<div class="orb dark" style="width:260px;height:260px;top:15%;left:80%;animation-delay:10s"></div>
<div class="orb red" style="width:220px;height:220px;top:75%;left:45%;animation-delay:12s"></div>
<div class="orb dark" style="width:300px;height:300px;top:55%;left:5%;animation-delay:14s"></div>
<div class="orb red" style="width:260px;height:260px;top:5%;left:35%;animation-delay:16s"></div>
<div class="orb dark" style="width:280px;height:280px;top:35%;left:75%;animation-delay:18s"></div>

<img src="heart.png" class="heart h1">
<img src="heart.png" class="heart h2">
<img src="heart.png" class="heart h3">
<img src="heart.png" class="heart h4">

<h1 class="title">LIFESTEAL</h1>

<a href="#invite-generator" class="join-btn">JOIN</a>

</section>

<section id="invite-generator" class="invite-section">

<div class="generator-container">

<canvas id="inviteCanvas"></canvas>

<div class="controls">

<label for="playerName">Enter Minecraft Username</label>

<input type="text" id="playerName" placeholder="Steve" maxlength="20">

<button id="downloadBtn" class="download-btn">DOWNLOAD INVITE</button>

</div>

</div>

</section>

<script>
const canvas=document.getElementById('inviteCanvas')
const ctx=canvas.getContext('2d')

const nameInput=document.getElementById('playerName')
const downloadBtn=document.getElementById('downloadBtn')

const inviteImage=new Image()
inviteImage.src="Your're Invited.png"

function drawCanvas(){

if(!inviteImage.complete)return

canvas.width=inviteImage.width
canvas.height=inviteImage.height

ctx.drawImage(inviteImage,0,0)

const name=nameInput.value

if(name){

const fontSize=Math.floor(canvas.width*0.055)
ctx.font=`${fontSize}px 'Minecraftia', monospace`
ctx.fillStyle="#61211b"

const textX = canvas.width * 0.12;
const textY = canvas.height * 0.82;

ctx.textAlign = "left";
ctx.fillText(name, textX, textY)

}
}

inviteImage.onload=drawCanvas

nameInput.addEventListener('input',drawCanvas)

downloadBtn.addEventListener('click',()=>{

const dataURL=canvas.toDataURL('image/png')

const link=document.createElement('a')
link.download='Lifesteal_Invite.png'
link.href=dataURL

link.click()

})
</script>

</body>
</html>
